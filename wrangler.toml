# Cloudflare Worker config for darrenkre.com
# Serves the static site (via the ASSETS binding) and handles form POSTs in src/index.js.
name = "darrenkre"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Serve the repo root as static assets. Files listed in .assetsignore
# (server code, config, docs) are excluded from what's publicly served.
[assets]
directory = "."
binding = "ASSETS"

# Secrets are NOT stored here. Set them once with:
#   npx wrangler secret put RESEND_API_KEY
#
# Optional plain vars can be overridden here if you prefer not to edit src/index.js:
[vars]
# TO_EMAIL   = "darren@darrenkre.com"
# FROM_EMAIL = "Darren K Real Estate <noreply@darrenkre.com>"
